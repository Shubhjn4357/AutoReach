name: Standalone Debug Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Standalone Debug Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Monorepo Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger Android Standalone APK Build
        run: |
          cd mobile
          eas build --platform android --profile preview --non-interactive --no-wait

      - name: Trigger iOS Standalone Simulator Build
        run: |
          cd mobile
          eas build --platform ios --profile simulator --non-interactive --no-wait
