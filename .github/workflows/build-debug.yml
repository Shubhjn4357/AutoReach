name: Standalone Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Monorepo Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Expo Prebuild (Generate Android native project)
        run: |
          cd mobile
          npx expo prebuild --platform android --no-install

      - name: Build Android Debug APK
        run: |
          cd mobile/android
          ./gradlew assembleDebug

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          # Decode the base64 string directly into the android/app folder
          echo "$KEYSTORE_BASE64" | base64 --decode > mobile/android/app/release.keystore

      - name: Build and Sign Android Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd mobile/android
          
          # Check if the keystore was successfully created in the previous step
          if [ -f "app/release.keystore" ]; then
            echo "Keystore found. Building and signing Release APK..."
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="${{ github.workspace }}/mobile/android/app/release.keystore" \
              -Pandroid.injected.signing.store.password="${KEYSTORE_PASSWORD}" \
              -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
              -Pandroid.injected.signing.key.password="${KEY_PASSWORD}"
          else
            echo "No keystore found. Building unsigned Release APK as fallback..."
            ./gradlew assembleRelease
          fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoReach-Debug-APK
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoReach-Release-APK
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error