name: Standalone Android Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Monorepo Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Expo Prebuild (Generate Android native project)
        run: |
          cd mobile
          npx expo prebuild --platform android --no-install

      - name: Build Android Debug APK
        run: |
          cd mobile/android
          ./gradlew assembleDebug

      - name: Build Android Release APK
        run: |
          cd mobile/android
          ./gradlew assembleRelease

      - name: Sign Release APK
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        if: ${{ env.ANDROID_KEYSTORE != '' }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > mobile/android/app/release.keystore
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
          $APKSIGNER sign --ks mobile/android/app/release.keystore \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --out mobile/android/app/build/outputs/apk/release/app-release-signed.apk \
            mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoReach-Debug-APK
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AutoReach-Release-APKs
          path: |
            mobile/android/app/build/outputs/apk/release/app-release-signed.apk
            mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
            mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: ignore


